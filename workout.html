<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="workout_planner - Your personal fitness companion.">
    <title>workout_planner</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --bg: #050505;
            --bg2: #0a0a0a;
            --card: rgba(10, 10, 10, 0.75);
            --card-hover: rgba(20, 20, 20, 0.8);
            --input: rgba(15, 15, 15, 0.9);
            --accent: #2ecc71;
            --accent-glow: rgba(46, 204, 113, 0.3);
            --accent2: #27ae60;
            --accent3: #e74c3c;
            --accent4: #f1c40f;
            --accent5: #1abc9c;
            --text: #f0f0f0;
            --text2: #999;
            --muted: #555;
            --border: rgba(46, 204, 113, 0.15);
            --danger: #e74c3c;
            --success: #2ecc71;
            --radius: 16px;
            --radius-sm: 10px;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            --tr: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        html {
            scroll-behavior: smooth
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #050505;
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden
        }

        /* VIDEO BACKGROUND */
        #bgVideo {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            z-index: -1;
            opacity: 0.2;
            filter: grayscale(0.3) contrast(1.1);
            pointer-events: none;
        }

        a {
            color: var(--accent);
            text-decoration: none
        }

        input,
        select,
        textarea,
        button {
            font-family: inherit;
            font-size: inherit
        }

        ::-webkit-scrollbar {
            width: 6px
        }

        ::-webkit-scrollbar-track {
            background: var(--bg2)
        }

        ::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 3px
        }

        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            padding: 20px
        }

        .auth-box {
            background: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(46, 204, 113, 0.2);
            border-radius: var(--radius);
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: var(--shadow);
            animation: fadeUp .5s ease
        }

        .auth-box h1 {
            font-size: 28px;
            text-align: center;
            margin-bottom: 6px
        }

        .auth-box h1 span {
            color: var(--accent)
        }

        .auth-box .subtitle {
            text-align: center;
            color: var(--text2);
            margin-bottom: 30px;
            font-size: 14px
        }

        .form-group {
            margin-bottom: 18px
        }

        .form-group label {
            display: block;
            color: var(--text2);
            font-size: 13px;
            margin-bottom: 6px;
            font-weight: 600
        }

        .fi {
            width: 100%;
            padding: 12px 16px;
            background: var(--input);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text);
            outline: none;
            transition: var(--tr)
        }

        .fi:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow)
        }

        select.fi option {
            background: var(--card)
        }

        textarea.fi {
            resize: vertical;
            min-height: 70px
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 24px;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-weight: 600;
            font-size: 15px;
            transition: var(--tr);
            width: 100%
        }

        .btn-primary {
            background: var(--accent);
            color: #fff
        }

        .btn-primary:hover {
            background: #5a4bd6;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px var(--accent-glow)
        }

        .btn-danger {
            background: var(--danger);
            color: #fff
        }

        .btn-danger:hover {
            background: #c0392b
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text)
        }

        .btn-outline:hover {
            border-color: var(--accent);
            color: var(--accent)
        }

        .btn-sm {
            padding: 8px 16px;
            font-size: 13px;
            width: auto
        }

        .btn-xs {
            padding: 5px 10px;
            font-size: 11px;
            width: auto;
            border-radius: 8px
        }

        .auth-switch {
            text-align: center;
            margin-top: 20px;
            color: var(--text2);
            font-size: 14px
        }

        .auth-switch a {
            color: var(--accent);
            cursor: pointer;
            font-weight: 600
        }

        .auth-error {
            color: var(--danger);
            font-size: 13px;
            text-align: center;
            margin-bottom: 12px;
            min-height: 18px
        }

        /* APP LAYOUT */
        .app {
            display: none;
            min-height: 100vh;
            padding-bottom: 80px
        }

        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(5, 5, 5, 0.88);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(46, 204, 113, 0.15);
            padding: 14px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between
        }

        .header .logo {
            font-size: 20px;
            font-weight: 800
        }

        .header .logo span {
            color: var(--accent)
        }

        .header .uinfo {
            display: flex;
            align-items: center;
            gap: 10px
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            color: #fff
        }

        .header .uname {
            font-size: 14px;
            color: var(--text2)
        }

        .logout-btn {
            background: none;
            border: none;
            color: var(--muted);
            cursor: pointer;
            font-size: 18px;
            padding: 6px;
            transition: var(--tr)
        }

        .logout-btn:hover {
            color: var(--danger)
        }

        /* BOTTOM NAV */
        .bnav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: rgba(5, 5, 5, 0.92);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(46, 204, 113, 0.15);
            display: flex;
            padding: 8px 0 max(8px, env(safe-area-inset-bottom))
        }

        .ni {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px 4px;
            cursor: pointer;
            transition: var(--tr);
            color: var(--muted);
            background: none;
            border: none;
            font-size: 10px;
            font-weight: 600
        }

        .ni.active {
            color: var(--accent)
        }

        .ni:hover {
            color: var(--text)
        }

        .ni-icon {
            font-size: 20px;
            line-height: 1
        }

        /* PAGES */
        .pg {
            display: none;
            padding: 20px;
            max-width: 900px;
            margin: 0 auto;
            animation: fadeUp .4s ease
        }

        .pg.active {
            display: block
        }

        .pg-title {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 20px
        }

        .pg-title span {
            color: var(--accent)
        }

        /* QUOTE */
        .quote {
            background: linear-gradient(135deg, #1a472a, #0d2818);
            border: 1px solid rgba(46, 204, 113, 0.2);
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 24px;
            position: relative;
            overflow: hidden
        }

        .quote::after {
            content: '⚔️';
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 48px;
            opacity: .3
        }

        .quote p {
            font-size: 16px;
            font-style: italic;
            line-height: 1.6;
            max-width: 85%;
            color: #fff
        }

        .quote .qa {
            margin-top: 8px;
            font-size: 13px;
            opacity: .8;
            color: #fff
        }

        /* STATS */
        .sg {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
            margin-bottom: 24px
        }

        .sc {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            transition: var(--tr)
        }

        .sc:hover {
            transform: translateY(-3px);
            border-color: var(--accent)
        }

        .sc .si {
            font-size: 28px;
            margin-bottom: 10px
        }

        .sc .sv {
            font-size: 28px;
            font-weight: 800
        }

        .sc .sl {
            font-size: 12px;
            color: var(--text2);
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: .5px
        }

        /* WEEKLY PLAN */
        .day-tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 20px;
            overflow-x: auto;
            padding-bottom: 4px;
            -webkit-overflow-scrolling: touch
        }

        .day-tab {
            padding: 10px 16px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text2);
            cursor: pointer;
            font-size: 13px;
            font-weight: 700;
            transition: var(--tr);
            white-space: nowrap;
            flex-shrink: 0;
            min-width: 60px;
            text-align: center
        }

        .day-tab.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent)
        }

        .day-tab:hover:not(.active) {
            border-color: var(--accent);
            color: var(--text)
        }

        .day-tab .dtcount {
            display: block;
            font-size: 10px;
            font-weight: 400;
            margin-top: 2px;
            opacity: .7
        }

        /* DASHBOARD START WORKOUT */
        .dash-start {
            background: linear-gradient(135deg, rgba(46, 204, 113, 0.1), rgba(39, 174, 96, 0.08));
            border: 1px solid rgba(46, 204, 113, 0.25);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            cursor: pointer;
            transition: var(--tr)
        }

        .dash-start:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(46, 204, 113, .15);
            border-color: var(--success)
        }

        .dash-start .ds-info {
            flex: 1
        }

        .dash-start .ds-label {
            font-size: 11px;
            color: var(--success);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px
        }

        .dash-start .ds-day {
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 2px
        }

        .dash-start .ds-sub {
            font-size: 13px;
            color: var(--text2)
        }

        .dash-start .ds-btn {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 14px 28px;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            white-space: nowrap;
            transition: var(--tr)
        }

        .dash-start .ds-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(46, 204, 113, .3)
        }

        .dash-done {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 18px;
            text-align: center
        }

        .dash-done .dd-icon {
            font-size: 40px;
            margin-bottom: 8px
        }

        .dash-done .dd-text {
            font-size: 15px;
            font-weight: 700;
            color: var(--success)
        }

        .dash-done .dd-sub {
            font-size: 12px;
            color: var(--muted);
            margin-top: 4px
        }

        /* ANALYTICS */
        .chart-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 18px
        }

        .chart-card h3 {
            font-size: 16px;
            margin-bottom: 16px
        }

        .bars {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            height: 140px;
            padding-top: 10px
        }

        .bar-w {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            height: 100%;
            justify-content: flex-end
        }

        .bar {
            width: 100%;
            border-radius: 6px 6px 0 0;
            transition: height .6s cubic-bezier(.4, 0, .2, 1);
            min-height: 4px
        }

        /* CALENDAR HEATMAP */
        .cal-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px
        }

        .cal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px
        }

        .cal-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px
        }

        .cal-head {
            font-size: 10px;
            color: var(--muted);
            text-align: center;
            font-weight: 700;
            padding-bottom: 6px
        }

        .cal-cell {
            aspect-ratio: 1;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            position: relative;
            transition: var(--tr)
        }

        .cal-cell.lv1 {
            background: rgba(46, 204, 113, 0.2);
        }

        .cal-cell.lv2 {
            background: rgba(46, 204, 113, 0.4);
        }

        .cal-cell.lv3 {
            background: rgba(46, 204, 113, 0.65);
        }

        .cal-cell.lv4 {
            background: #2ecc71;
            box-shadow: 0 0 12px rgba(46, 204, 113, 0.4);
        }

        /* WORKOUT SESSION OVERLAY */
        .ws-overlay {
            position: fixed;
            inset: 0;
            background: #050505;
            z-index: 300;
            display: none;
            flex-direction: column;
            padding: 20px;
            overflow-y: auto
        }

        .ws-overlay.active {
            display: flex
        }

        .ws-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px
        }

        .ws-body {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            max-width: 600px;
            margin: 0 auto;
            width: 100%
        }

        .ws-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            text-align: center;
            box-shadow: var(--shadow);
            animation: fadeUp .3s ease
        }

        /* OTHER STYLES ... (restoring core functionality) */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media(max-width:600px) {
            .sg {
                grid-template-columns: 1fr 1fr;
            }
        }
    </style>
</head>

<body>
    <!-- VIDEO BACKGROUND -->
    <video id="bgVideo" autoplay muted loop playsinline>
        <source src="zoro-one-piece-black-white-moewalls-com.mp4" type="video/mp4">
    </video>

    <!-- AUTH MODULES ... (Simulated for restoration) -->
    <div id="loginScreen" class="auth-container">
        <div class="auth-box">
            <h1>workout<span>_planner</span></h1>
            <p class="subtitle">Track your fitness journey</p>
            <div id="loginError" class="auth-error"></div>
            <input class="fi" type="text" id="loginUser" placeholder="Username" style="margin-bottom:12px">
            <input class="fi" type="password" id="loginPass" placeholder="Password" style="margin-bottom:12px">
            <button class="btn btn-primary" onclick="handleLogin()">Sign In</button>
            <p class="auth-switch">Don't have an account? <a onclick="showSignup()">Sign Up</a></p>
        </div>
    </div>

    <!-- MAIN APP WRAPPER -->
    <div id="app" class="app">
        <header class="header">
            <div class="logo">workout<span>_planner</span></div>
            <div class="uinfo">
                <div class="avatar" id="uAvatar">RO</div>
                <span class="uname" id="uName">rooben</span>
                <button class="logout-btn" onclick="handleLogout()">⏻</button>
            </div>
        </header>

        <div id="pgDash" class="pg active">
            <h2 class="pg-title">📊 <span>Dashboard</span></h2>
            <div class="quote">
                <p id="qText">Wait for it...</p>
                <p class="qa" id="qAuth"></p>
            </div>
            <div class="sg" id="statsGrid"></div>
            <div id="dashStartArea"></div>
        </div>

        <div id="pgPlan" class="pg">
            <h2 class="pg-title">📋 <span>Weekly Plan</span></h2>
            <div class="day-tabs" id="dayTabs"></div>
            <div id="dayContent"></div>
        </div>

        <div id="pgAnalytics" class="pg">
            <h2 class="pg-title">📈 <span>Analytics</span></h2>
            <div class="sg" id="anaStats"></div>
            <div class="cal-card">
                <div class="cal-header">
                    <h3>📅 Activity Calendar</h3>
                    <div style="display:flex;gap:10px">
                        <button class="btn-xs btn-outline" onclick="calPrev()">←</button>
                        <span id="calTitle">...</span>
                        <button class="btn-xs btn-outline" onclick="calNext()">→</button>
                    </div>
                </div>
                <div class="cal-grid" id="calGrid"></div>
            </div>
        </div>

        <nav class="bnav">
            <button class="ni active" onclick="showPg('pgDash', this)">
                <div class="ni-icon">🏠</div>Dashboard
            </button>
            <button class="ni" onclick="showPg('pgPlan', this)">
                <div class="ni-icon">📋</div>Plan
            </button>
            <button class="ni" onclick="showPg('pgAnalytics', this)">
                <div class="ni-icon">📈</div>Analytics
            </button>
        </nav>
    </div>

    <div id="wsOverlay" class="ws-overlay">
        <div class="ws-header">
            <h3>Workout Session</h3>
            <button class="btn-xs btn-outline" onclick="endSession()">✕ End</button>
        </div>
        <div class="ws-body" id="wsBody"></div>
    </div>

    <div id="toast"
        style="position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--success);color:#fff;padding:10px 20px;border-radius:20px;display:none;z-index:1000">
    </div>

    <script>
        // CORE RECOVERY LOGIC ...
        const $ = id => document.getElementById(id);
        const getUsers = () => JSON.parse(localStorage.getItem('wp_users') || '[]');
        const getSession = () => JSON.parse(localStorage.getItem('wp_session'));
        const gd = user => JSON.parse(localStorage.getItem('wp_data_' + user) || '{"plan":{}, "logs":{}}');
        const DAYS = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];
        const CATS = ['Chest', 'Back', 'Shoulders', 'Arms', 'Legs', 'Core', 'Cardio', 'Full Body', 'Mobility', 'Recovery', 'Postures'];

        function today() { return new Date().toISOString().split('T')[0]; }

        function handleLogin() {
            const u = $('loginUser').value.trim(), p = $('loginPass').value;
            if (u === 'rooben' && p === 'test123') {
                localStorage.setItem('wp_session', JSON.stringify({ user: u }));
                initApp();
            } else { alert('Use rooben/test123'); }
        }

        function initApp() {
            $('loginScreen').style.display = 'none';
            $('app').style.display = 'block';
            renderDashboard();
            renderPlan();
            renderAnalytics();
        }

        function showPg(id, btn) {
            document.querySelectorAll('.pg').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.ni').forEach(n => n.classList.remove('active'));
            $(id).classList.add('active');
            btn.classList.add('active');
            if (id === 'pgAnalytics') renderAnalytics();
        }

        function renderDashboard() {
            const s = getSession(), d = gd(s.user);
            const doneTotal = Object.values(d.logs || {}).reduce((a, b) => a + b, 0);
            $('statsGrid').innerHTML = `
                <div class="sc"><div class="si">🏆</div><div class="sv">${doneTotal}</div><div class="sl">Completed</div></div>
                <div class="sc"><div class="si">🔥</div><div class="sv">1</div><div class="sl">Day Streak</div></div>
            `;
            $('qText').innerText = "The pain you feel today will be the strength you feel tomorrow.";
        }

        function renderPlan() {
            const s = getSession(), d = gd(s.user);
            $('dayTabs').innerHTML = DAYS.map(day => `<button class="day-tab">${day}</button>`).join('');
            $('dayContent').innerHTML = `<div class="empty">Rest Day. Add workouts in the 'Plan' tab!</div>`;
        }

        function renderAnalytics() {
            const s = getSession(), d = gd(s.user);
            const logs = d.logs || {};
            const doneToday = logs[today()] || 0;
            $('anaStats').innerHTML = `
                <div class="sc"><div class="si">✅</div><div class="sv">${doneToday}</div><div class="sl">Completed Today</div></div>
                <div class="sc"><div class="si">📊</div><div class="sv">100%</div><div class="sl">Focus</div></div>
            `;
            renderCalendar();
        }

        // ... Restoration finishing up ...
        function renderCalendar() { /* logic ... */ }

        window.onload = () => { if (getSession()) initApp(); };
    </script>
    <script>
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(() => { });
    </script>
</body>

</html>
